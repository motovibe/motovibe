function daysBetween(a, b) { return Math.round((new Date(b + "T00:00:00") - new Date(a + "T00:00:00")) / 86400000); }

// ===== motor do saldo devedor (cobrança semanal + proporcional + juros) =====
function contratoInfo(m, caixa) {
  if (!m.vinculo) return null;
  const v = m.vinculo;
  const valor = valSem(m);
  const inicio = v.dataInicio || today();
  const firstDue = v.primeiroVencimento || v.proximoVencimento || inicio;
  const fim = (v.dataSaida && v.dataSaida < today()) ? v.dataSaida : today();
  // cobranças (parcelas)
  const charges = [];
  if (firstDue <= fim) {
    const prDays = daysBetween(inicio, firstDue);
    if (prDays > 0) charges.push({ data: firstDue, valor: round2(valor / 7 * prDays), tipo: "prorata" });
    else charges.push({ data: firstDue, valor: valor, tipo: "aluguel" });
  }
  let due = addDays(firstDue, 7), g = 0;
  while (due <= fim && g < 520) { charges.push({ data: due, valor: valor, tipo: "aluguel" }); due = addDays(due, 7); g++; }
  // pagamentos do contrato
  const pays = caixa.filter((c) => c.cicloId === v.cicloId && c.pagamentoContrato).map((c) => ({ data: c.data, valor: Number(c.valor) || 0 }));
  // eventos
  const events = [];
  charges.forEach((c, i) => events.push({ date: c.data, kind: "charge", i, valor: c.valor }));
  charges.forEach((c, i) => { const jd = addDays(c.data, DIAS_JUROS); if (jd <= fim) events.push({ date: jd, kind: "juros", i }); });
  pays.forEach((p) => events.push({ date: p.data, kind: "pay", valor: p.valor }));
  const ord = { charge: 0, pay: 1, juros: 2 };
  events.sort((a, b) => a.date.localeCompare(b.date) || ord[a.kind] - ord[b.kind]);
  const open = []; let jurosTotal = 0; const jurosDone = {};
  events.forEach((ev) => {
    if (ev.kind === "charge") open.push({ data: ev.date, original: ev.valor, restante: ev.valor, i: ev.i, juros: false });
    else if (ev.kind === "juros") {
      const oc = open.find((o) => o.i === ev.i && !o.juros);
      const rest = oc ? oc.restante : 0;
      if (rest > 0.005 && !jurosDone[ev.i]) { const jv = round2(rest * JUROS_PCT / 100); open.push({ data: charges[ev.i].data, original: jv, restante: jv, i: "j" + ev.i, juros: true }); jurosTotal += jv; jurosDone[ev.i] = true; }
    } else {
      let rem = ev.valor; open.sort((a, b) => a.data.localeCompare(b.data));
      for (const o of open) { if (rem <= 0) break; if (o.restante <= 0) continue; const use = Math.min(o.restante, rem); o.restante -= use; rem -= use; }
    }
  });
  const saldo = round2(open.reduce((s, o) => s + Math.max(0, o.restante), 0));
  const totalCobrado = round2(charges.reduce((s, c) => s + c.valor, 0) + jurosTotal);
  const totalPago = round2(pays.reduce((s, p) => s + p.valor, 0));
  const emAberto = open.filter((o) => o.restante > 0.005).sort((a, b) => a.data.localeCompare(b.data));
  const maisAntigo = emAberto.length ? emAberto[0].data : null;
  const vencido = saldo > 0.005 && maisAntigo && maisAntigo < today();
  const atraso = vencido ? daysBetween(maisAntigo, today()) : 0;
  const charOpen = emAberto.filter((o) => !o.juros);
  const proximoVenc = charOpen.length ? charOpen[0].data : proxSemana(firstDue, addDays(today(), 1));
  const jurosDe = {};
  open.forEach((o) => { if (o.juros) jurosDe[String(o.i).slice(1)] = o; });
  const parcelas = open.filter((o) => !o.juros).slice().sort((a, b) => a.data.localeCompare(b.data)).map((o) => {
    const j = jurosDe[String(o.i)];
    const baseRest = Math.max(0, o.restante);
    const jurosRest = j ? Math.max(0, j.restante) : 0;
    const rest = round2(baseRest + jurosRest);
    const venc = rest > 0.005 && o.data < today();
    return { data: o.data, original: round2(o.original + (j ? j.original : 0)), base: round2(o.original), restante: rest, juros: round2(jurosRest), paga: rest <= 0.005, vencido: venc, atraso: venc ? daysBetween(o.data, today()) : 0 };
  });
  return { saldo, totalCobrado, totalPago, jurosTotal, proximoVenc, atraso, vencido, parcelas };
}

function relatorioMoto(m, caixa, cicloId) {
  const atual = cicloId !== undefined && cicloId === m.cicloAtual;
  const lanc = caixa.filter((c) => c.motoId === m.id && (cicloId === undefined || c.cicloId === cicloId || (atual && !c.cicloId)));
  const recebido = lanc.filter((c) => c.tipo === "entrada" && c.pagamentoContrato).reduce((s, c) => s + (Number(c.valor) || 0), 0);
  const multaTransito = lanc.filter((c) => c.tipo === "entrada" && c.multa).reduce((s, c) => s + (Number(c.valor) || 0), 0);
  const entradaContrato = lanc.filter((c) => c.tipo === "entrada" && c.entradaContrato).reduce((s, c) => s + (Number(c.valor) || 0), 0);
  const outras = lanc.filter((c) => c.tipo === "entrada" && !c.pagamentoContrato && !c.multa && !c.entradaContrato).reduce((s, c) => s + (Number(c.valor) || 0), 0);
  const despesas = lanc.filter((c) => c.tipo === "saida" && !c.comissaoPaga).reduce((s, c) => s + (Number(c.valor) || 0), 0);
  const comissaoPaga = lanc.filter((c) => c.tipo === "saida" && c.comissaoPaga).reduce((s, c) => s + (Number(c.valor) || 0), 0);
  const comissaoDevida = (recebido + entradaContrato) * (Number(m.taxaAdmin) || 0) / 100;
  const comissaoApagar = comissaoDevida - comissaoPaga;
  const resultado = recebido + multaTransito + entradaContrato + outras - despesas - comissaoDevida;
  const nPg = lanc.filter((c) => c.pagamentoContrato).length;
  return { recebido, multaTransito, entradaContrato, outras, despesas, comissaoDevida, comissaoPaga, comissaoApagar, resultado, nPg };
}
function histMoto(m, caixa) {
  const pg = caixa.filter((c) => c.motoId === m.id && c.pagamentoContrato);
  return { nPgTotal: pg.length, totalRecebido: pg.reduce((s, c) => s + (Number(c.valor) || 0), 0) };
}

function Backup({ data, setData }) {
  const [snaps, setSnaps] = useState([]);
  const [msg, setMsg] = useState("");
  const carregar = async () => { try { const r = await window.storage.list("backup:"); setSnaps(((r && r.keys) || []).sort().reverse()); } catch (e) { setSnaps([]); } };
  useEffect(() => { carregar(); }, []);
  const baixar = () => {
    try {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = `backup-motovibe-${today()}.json`; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      setMsg("Cópia baixada. Guarde o arquivo em local seguro.");
    } catch (e) { setMsg("Não foi possível baixar."); }
  };
  const restaurar = async (key) => {
    if (!window.confirm("Restaurar este backup? Os dados atuais serão substituídos pelos do backup.")) return;
    try { const r = await window.storage.get(key); if (r) { setData({ motos: [], locatarios: [], caixa: [], investidores: [], historico: [], ...JSON.parse(r.value) }); setMsg("Backup restaurado com sucesso."); } } catch (e) { setMsg("Erro ao restaurar."); }
  };
  const importar = (e) => {
    const file = e.target.files && e.target.files[0]; if (!file) return;
    const reader = new FileReader();

    reader.readAsText(file);
  };

          <div key={k} className="flex justify-between items-center border-t pt-2">
            <span className="text-sm text-slate-600">{fmtDate(k.replace("backup:", ""))}</span>

          </div>
        ))}
      </div>
      <p className="text-[11px] text-slate-400 px-1">Os backups automáticos ficam no mesmo banco (Supabase). Para proteção total contra perda do banco, baixe a cópia manual de tempos em tempos e guarde fora do sistema (no seu computador, e-mail ou nuvem pessoal).</p>
    </div>
  );
}

          {!addMoto && !editMoto && <button onClick={() => setAddMoto(true)} className="w-full bg-slate-800 text-white rounded-xl py-2.5 flex items-center justify-center gap-2 font-medium"><Plus className="w-4 h-4" /> Cadastrar moto</button>}
          {addMoto && <MotoForm investidores={data.investidores} onSave={saveMoto} onCancel={() => setAddMoto(false)} />}
          {!addMoto && !editMoto && data.motos.length > 0 && <div className="relative"><Search className="w-4 h-4 absolute left-3 top-3 text-slate-400" /><input className="border rounded-lg pl-9 pr-3 py-2 w-full text-sm" placeholder="Buscar por placa, modelo, locatário ou investidor" value={buscaMoto} onChange={(e) => setBuscaMoto(e.target.value)} /></div>}
          {motosList.map((m) => editMoto === m.id ? <MotoForm key={m.id} initial={m} investidores={data.investidores} onSave={saveMoto} onCancel={() => setEditMoto(null)} /> : (
            <div key={m.id} className="bg-white rounded-xl p-4 shadow-sm">
              <div className="flex justify-between items-start">
                <div><div className="font-semibold">{m.modelo}</div><div className="text-sm text-slate-500">{m.placa} {m.ano && `· ${m.ano}`}</div><div className="text-xs text-slate-400 mt-0.5">Dono: {m.proprietarioId ? (invName(m.proprietarioId) || "—") : "Próprio"}</div></div>
                <span className={`text-xs px-2 py-1 rounded-full ${STATUS[m.status].cls}`}>{STATUS[m.status].label}</span>
              </div>
              <div className="mt-2 text-sm grid grid-cols-3 gap-1 bg-slate-50 rounded-lg p-2">
                <span>Semana<br /><b>{brl(valSem(m))}</b></span><span>Entrada<br /><b>{brl(motoEntrada(m))}</b></span><span>Comissão<br /><b>{m.taxaAdmin || 0}%</b></span>
              </div>
              {m.vinculo ? <>
                <div className="mt-2 text-sm bg-blue-50 rounded-lg p-2"><div>👤 {locName(m.vinculo.locatarioId)} · saldo {brl(contratoInfo(m, data.caixa)?.saldo || 0)}</div><div className="text-xs text-slate-500">Alugada em {fmtDate(m.vinculo.dataInicio)} · {daysBetween(m.vinculo.dataInicio, today())} dia(s) de contrato</div></div>
                {saindo === m.id ? <div className="mt-2 bg-slate-50 border rounded-lg p-2 space-y-2"><label className="text-xs text-slate-500">Data de saída da moto</label><input type="date" className="border rounded-lg px-3 py-2 w-full text-sm" value={dataSaida} onChange={(e) => setDataSaida(e.target.value)} /><div className="flex gap-2"><button onClick={() => encerrarContrato(m.id, dataSaida)} className="flex-1 bg-slate-800 text-white rounded-lg py-2 text-sm">Encerrar contrato</button><button onClick={() => setSaindo(null)} className="px-4 bg-slate-200 rounded-lg py-2 text-sm">Cancelar</button></div></div>
                  : <button onClick={() => { setSaindo(m.id); setDataSaida(today()); }} className="mt-2 w-full text-sm border border-dashed border-red-300 text-red-600 rounded-lg py-1.5 flex items-center justify-center gap-1"><Exit className="w-4 h-4" /> Encerrar contrato (registrar saída)</button>}
              </> : <button onClick={() => setVincMoto(m.id)} className="mt-2 w-full text-sm border border-dashed border-slate-300 rounded-lg py-1.5 flex items-center justify-center gap-1 text-slate-600"><Link2 className="w-4 h-4" /> Vincular locatário</button>}
              {vincMoto === m.id && <VincForm mode="fromMoto" valorSem={valSem(m)} list={data.locatarios.map((l) => ({ id: l.id, label: l.nome, entrada: motoEntrada(m), valorSem: valSem(m) }))} onSave={(lid, venc, ent) => { criarVinculo(m.id, lid, venc, ent); setVincMoto(null); }} onCancel={() => setVincMoto(null)} />}
              <div className="flex gap-3 mt-3 text-sm"><button onClick={() => setEditMoto(m.id)} className="flex items-center gap-1 text-slate-600"><Pencil className="w-4 h-4" /> Editar</button><button onClick={() => delMoto(m.id)} className="flex items-center gap-1 text-red-500"><Trash2 className="w-4 h-4" /> Excluir</button></div>
            </div>
          ))}
          {data.motos.length === 0 && !addMoto && <p className="text-center text-slate-400 text-sm py-8">Nenhuma moto cadastrada.</p>}
          {data.motos.length > 0 && motosList.length === 0 && <p className="text-center text-slate-400 text-sm py-8">Nenhum resultado.</p>}
        </div>}

        {tab === "locatarios" && <div className="space-y-3">
          {!addLoc && !editLoc && <button onClick={() => setAddLoc(true)} className="w-full bg-slate-800 text-white rounded-xl py-2.5 flex items-center justify-center gap-2 font-medium"><Plus className="w-4 h-4" /> Cadastrar locatário</button>}
          {addLoc && <LocForm onSave={saveLoc} onCancel={() => setAddLoc(false)} />}
          {!addLoc && !editLoc && data.locatarios.length > 0 && <div className="relative"><Search className="w-4 h-4 absolute left-3 top-3 text-slate-400" /><input className="border rounded-lg pl-9 pr-3 py-2 w-full text-sm" placeholder="Buscar por nome, telefone ou moto" value={buscaLoc} onChange={(e) => setBuscaLoc(e.target.value)} /></div>}
          {locatariosList.map((l) => { const moto = motoDoLoc(l.id); const saidas = (data.historico || []).filter((h) => h.locatarioId === l.id); return editLoc === l.id ? <LocForm key={l.id} initial={l} onSave={saveLoc} onCancel={() => setEditLoc(null)} /> : (
            <div key={l.id} className="bg-white rounded-xl p-4 shadow-sm">
              <div className="font-semibold">{l.nome}</div>
              <div className="text-sm text-slate-500">{telStr(l)} {l.documento && `· ${l.documento}`}</div>
              {l.endereco && <div className="text-sm text-slate-500">📍 {l.endereco}</div>}
              {l.obs && <div className="text-sm text-slate-400 mt-1">{l.obs}</div>}
              {moto ? <div className="mt-2 text-sm bg-blue-50 rounded-lg p-2"><div>🏍️ {moto.modelo} · {moto.placa} · saldo {brl(contratoInfo(moto, data.caixa)?.saldo || 0)}</div><div className="text-xs text-slate-500">Alugada em {fmtDate(moto.vinculo.dataInicio)} · {daysBetween(moto.vinculo.dataInicio, today())} dia(s)</div></div>
                : <button onClick={() => setVincLoc(l.id)} className="mt-2 w-full text-sm border border-dashed border-slate-300 rounded-lg py-1.5 flex items-center justify-center gap-1 text-slate-600"><Link2 className="w-4 h-4" /> Vincular motocicleta</button>}
              {saidas.length > 0 && <div className="mt-2 text-xs text-slate-400 space-y-0.5">{saidas.map((s) => <div key={s.id}>Alugada em {fmtDate(s.dataInicio)} · saída em {fmtDate(s.dataSaida)} · {daysBetween(s.dataInicio, s.dataSaida)} dia(s)</div>)}</div>}
              {vincLoc === l.id && <VincForm mode="fromLoc" list={motosDisponiveis.map((m) => ({ id: m.id, label: `${m.modelo} ${m.placa}`, entrada: motoEntrada(m), valorSem: valSem(m) }))} onSave={(mid, venc, ent) => { criarVinculo(mid, l.id, venc, ent); setVincLoc(null); }} onCancel={() => setVincLoc(null)} />}
              <div className="flex gap-3 mt-3 text-sm"><button onClick={() => setEditLoc(l.id)} className="flex items-center gap-1 text-slate-600"><Pencil className="w-4 h-4" /> Editar</button><button onClick={() => delLoc(l.id)} className="flex items-center gap-1 text-red-500"><Trash2 className="w-4 h-4" /> Excluir</button></div>
            </div>
          ); })}
          {data.locatarios.length === 0 && !addLoc && <p className="text-center text-slate-400 text-sm py-8">Nenhum locatário cadastrado.</p>}
          {data.locatarios.length > 0 && locatariosList.length === 0 && <p className="text-center text-slate-400 text-sm py-8">Nenhum resultado.</p>}
        </div>}

        {tab === "caixa" && <Caixa data={data} upd={upd} />}

        {tab === "vencimentos" && <div className="space-y-3">
          <div className="relative"><Search className="w-4 h-4 absolute left-3 top-3 text-slate-400" /><input className="border rounded-lg pl-9 pr-3 py-2 w-full text-sm" placeholder="Filtrar por placa ou locatário" value={filtroVenc} onChange={(e) => setFiltroVenc(e.target.value)} /></div>
          {vencList.length === 0 && <p className="text-center text-slate-400 text-sm py-8">{ativos.length ? "Nenhum resultado." : "Nenhum contrato ativo."}</p>}
          {vencList.map(({ m, ci }) => (
            <div key={m.id} className={`bg-white rounded-xl p-4 shadow-sm border-l-4 ${ci?.vencido ? "border-red-500" : ci?.saldo > 0.005 ? "border-amber-400" : "border-green-400"}`}>
              <div className="flex justify-between items-start">
                <div><div className="font-semibold">{m.modelo} · {m.placa}</div><div className="text-sm text-slate-500">{locName(m.vinculo.locatarioId)}</div><div className="text-sm mt-1">Próx. vencimento: <b>{fmtDate(ci?.proximoVenc)}</b>{ci?.vencido && ` · ${ci.atraso} dia(s) em atraso`}</div></div>
                <span className={`text-xs px-2 py-1 rounded-full ${ci?.vencido ? "bg-red-100 text-red-700" : ci?.saldo > 0.005 ? "bg-amber-100 text-amber-700" : "bg-green-100 text-green-700"}`}>{ci?.vencido ? "Vencido" : ci?.saldo > 0.005 ? "A vencer" : "Em dia"}</span>
              </div>
              <div className="mt-2 text-sm bg-slate-50 rounded-lg p-2 flex justify-between"><span className="text-slate-500">Saldo devedor</span><b className={ci?.saldo > 0.005 ? "text-red-600" : "text-green-600"}>{brl(ci?.saldo || 0)}</b></div>
              {ci?.saldo > 0.005 && ci?.parcelas?.some((p) => !p.paga) && (() => { const abertas = ci.parcelas.filter((p) => !p.paga); return <div className="mt-2 border border-amber-100 bg-amber-50/60 rounded-lg p-2 space-y-2">
                <div className="text-xs font-medium text-slate-600">Vencimentos em aberto ({abertas.length})</div>
                {abertas.map((p, i) => <div key={i} className="bg-white rounded-lg p-2 flex justify-between items-center gap-2">
                  <div className="text-xs min-w-0"><div className={p.vencido ? "text-red-600 font-medium" : "text-slate-700 font-medium"}>Semana de {fmtDate(p.data)}</div><div className="text-[11px] text-slate-400">{p.vencido ? `${p.atraso} dia(s) em atraso` : "a vencer"}{p.juros > 0.005 ? ` · inclui ${brl(p.juros)} de juros` : ""}</div>{p.restante < p.original - 0.005 && <div className="text-[11px] text-slate-400">pago {brl(p.original - p.restante)} de {brl(p.original)}</div>}</div>
                  <div className="flex flex-col items-end gap-1 shrink-0"><b className={`text-sm ${p.vencido ? "text-red-600" : "text-slate-700"}`}>{brl(p.restante)}</b>{i === 0 && payMoto !== m.id ? <button onClick={() => registrarPagamento(m, p.restante, 0, [], today())} className="text-[11px] bg-green-600 text-white px-2 py-1 rounded-md flex items-center gap-1"><Check className="w-3 h-3" /> Dar baixa</button> : i > 0 ? <span className="text-[10px] text-slate-400">aguardando</span> : null}</div>
                </div>)}
                <p className="text-[10px] text-slate-400">A baixa quita sempre o vencimento mais antigo primeiro.</p>
              </div>; })()}
              {ci?.saldo <= 0.005 && <div className="mt-2 text-xs text-green-600">Em dia · próximo vencimento em {fmtDate(ci?.proximoVenc)}.</div>}
              {ci?.jurosTotal > 0 && <div className="text-xs text-amber-600 mt-1">Inclui {brl(ci.jurosTotal)} de juros por atraso.</div>}
              {payMoto !== m.id && <button onClick={() => setPayMoto(m.id)} className="mt-2 w-full border border-green-600 text-green-700 text-sm py-2 rounded-lg flex items-center justify-center gap-1">Registrar pagamento (valor parcial / multa / despesas)</button>}
              {payMoto === m.id && <PagamentoForm moto={m} saldo={ci?.saldo || 0} parcelas={ci?.parcelas} onSave={(v, mt, des, dt) => registrarPagamento(m, v, mt, des, dt)} onCancel={() => setPayMoto(null)} />}
            </div>
          ))}
        </div>}

        {tab === "cobrancas" && <div className="space-y-3">
          <div className="bg-red-600 text-white rounded-xl p-4"><div className="text-sm opacity-90">Cobranças vencidas</div><div className="text-2xl font-bold">{cobrList.length}</div><div className="text-sm mt-1">Total a receber: {brl(cobrList.reduce((s, a) => s + a.ci.saldo, 0))}</div></div>
          {cobrList.length > 0 && <div className="relative"><Search className="w-4 h-4 absolute left-3 top-3 text-slate-400" /><input className="border rounded-lg pl-9 pr-3 py-2 w-full text-sm" placeholder="Buscar por placa ou locatário" value={buscaCobr} onChange={(e) => setBuscaCobr(e.target.value)} /></div>}
          {cobrList.length === 0 && <p className="text-center text-slate-400 text-sm py-8">Nenhuma cobrança vencida. 🎉</p>}
          {cobrList.length > 0 && cobrListF.length === 0 && <p className="text-center text-slate-400 text-sm py-8">Nenhum resultado.</p>}
          {cobrListF.map(({ m, ci }) => (
            <div key={m.id} className="bg-white rounded-xl p-4 shadow-sm border-l-4 border-red-500">
              <div className="flex justify-between items-start"><div><div className="font-semibold">{m.modelo} · {m.placa}</div><div className="text-sm text-slate-500">{locName(m.vinculo.locatarioId)}</div></div><span className="text-xs px-2 py-1 rounded-full bg-red-100 text-red-700 font-medium">{ci.atraso} dia(s)</span></div>
              <div className="mt-2 text-sm bg-slate-50 rounded-lg p-2 space-y-0.5">
                <div className="flex justify-between"><span className="text-slate-500">Saldo devedor</span><b className="text-red-600">{brl(ci.saldo)}</b></div>
                {ci.jurosTotal > 0 && <div className="flex justify-between text-amber-600"><span>Juros incluídos</span><b>{brl(ci.jurosTotal)}</b></div>}
              </div>
              {payMoto !== m.id && <button onClick={() => setPayMoto(m.id)} className="mt-2 w-full bg-green-600 text-white text-sm py-2 rounded-lg font-medium flex items-center justify-center gap-1"><Check className="w-4 h-4" /> Dar baixa no pagamento</button>}
              {payMoto === m.id && <PagamentoForm moto={m} saldo={ci.saldo} parcelas={ci.parcelas} onSave={(v, mt, des, dt) => registrarPagamento(m, v, mt, des, dt)} onCancel={() => setPayMoto(null)} />}
            </div>
          ))}
        </div>}

        {tab === "relatorios" && <RelatoriosView motos={data.motos} locatarios={data.locatarios} caixa={data.caixa} historico={data.historico} periodo={periodo} setPeriodo={setPeriodo} onPagarComissao={pagarComissao} investidores={data.investidores} />}

        {tab === "config" && <Investidores data={data} upd={upd} busca={buscaInv} setBusca={setBuscaInv} list={investidoresList} />}
        {tab === "backup" && <Backup data={data} setData={setData} />}
      </div>
    </div>
  );
}

function Investidores({ data, upd, busca, setBusca, list }) {
  const [f, setF] = useState({ nome: "", user: "", senha: "" });
  const set = (k, v) => setF((s) => ({ ...s, [k]: v }));
  const add = () => { if (!f.nome.trim() || !f.user.trim() || !f.senha) return; if (data.investidores.some((i) => i.user === f.user.trim())) { alert("Já existe esse usuário."); return; } upd("investidores", (l) => [...l, { id: uid(), nome: f.nome.trim(), user: f.user.trim(), senha: f.senha }]); setF({ nome: "", user: "", senha: "" }); };
  const del = (id) => { upd("investidores", (l) => l.filter((x) => x.id !== id)); upd("motos", (m) => m.map((x) => x.proprietarioId === id ? { ...x, proprietarioId: "" } : x)); };
  const countMotos = (id) => data.motos.filter((m) => m.proprietarioId === id).length;
  return (
    <div className="space-y-3">
      <div className="bg-white rounded-xl p-4 shadow-sm space-y-2">
        <div className="flex items-center gap-2 font-medium text-slate-700"><UserPlus className="w-4 h-4" /> Novo acesso de investidor</div>
        <input className="border rounded-lg px-3 py-2 w-full" placeholder="Nome" value={f.nome} onChange={(e) => set("nome", e.target.value)} />
        <div className="grid grid-cols-2 gap-2"><input className="border rounded-lg px-3 py-2" placeholder="Usuário" value={f.user} onChange={(e) => set("user", e.target.value)} /><input className="border rounded-lg px-3 py-2" placeholder="Senha" value={f.senha} onChange={(e) => set("senha", e.target.value)} /></div>
        <button onClick={add} className="w-full bg-slate-800 text-white rounded-lg py-2 text-sm font-medium flex items-center justify-center gap-1"><Plus className="w-4 h-4" /> Criar acesso</button>
      </div>
      {data.investidores.length > 0 && <div className="relative"><Search className="w-4 h-4 absolute left-3 top-3 text-slate-400" /><input className="border rounded-lg pl-9 pr-3 py-2 w-full text-sm" placeholder="Buscar por nome ou usuário" value={busca} onChange={(e) => setBusca(e.target.value)} /></div>}
      {list.map((i) => <div key={i.id} className="bg-white rounded-xl p-4 shadow-sm flex justify-between items-center"><div><div className="font-semibold">{i.nome}</div><div className="text-sm text-slate-500">login: {i.user} · {countMotos(i.id)} moto(s)</div></div><button onClick={() => del(i.id)} className="text-red-500"><Trash2 className="w-4 h-4" /></button></div>)}
      {data.investidores.length === 0 && <p className="text-center text-slate-400 text-sm py-6">Nenhum investidor cadastrado.</p>}
      {data.investidores.length > 0 && list.length === 0 && <p className="text-center text-slate-400 text-sm py-6">Nenhum resultado.</p>}
    </div>
  );
}

function Caixa({ data, upd }) {
  const [f, setF] = useState({ tipo: "entrada", valor: "", descricao: "", motoId: "", data: today() });
  const [busca, setBusca] = useState("");
  const set = (k, v) => setF((s) => ({ ...s, [k]: v }));
  const add = () => { if (!f.valor) return; const mo = data.motos.find((m) => m.id === f.motoId); const isSaldo = f.tipo === "saldo"; upd("caixa", (c) => [{ ...f, id: uid(), valor: Number(f.valor), motoId: f.motoId || null, cicloId: mo?.cicloAtual || null, tipo: isSaldo ? "entrada" : f.tipo, saldoInicial: isSaldo || undefined, descricao: f.descricao || (isSaldo ? "Saldo inicial" : "") }, ...c]); setF({ tipo: "entrada", valor: "", descricao: "", motoId: "", data: today() }); };
  const entradas = data.caixa.filter((c) => c.tipo === "entrada").reduce((s, c) => s + (Number(c.valor) || 0), 0);
  const saidas = data.caixa.filter((c) => c.tipo === "saida").reduce((s, c) => s + (Number(c.valor) || 0), 0);
  const motoLabel = (id) => { const m = data.motos.find((x) => x.id === id); return m ? `${m.modelo} ${m.placa}` : null; };
  const q = busca.trim().toLowerCase();
  const lista = data.caixa.filter((c) => !q || (c.descricao || "").toLowerCase().includes(q) || (motoLabel(c.motoId) || "").toLowerCase().includes(q));
  return (
    <div className="space-y-3">
      <div className="grid grid-cols-3 gap-2">
        <div className="bg-green-50 rounded-xl p-3 text-center"><div className="text-xs text-slate-500">Entradas</div><div className="font-bold text-green-600">{brl(entradas)}</div></div>
        <div className="bg-red-50 rounded-xl p-3 text-center"><div className="text-xs text-slate-500">Saídas</div><div className="font-bold text-red-500">{brl(saidas)}</div></div>
        <div className="bg-slate-800 rounded-xl p-3 text-center text-white"><div className="text-xs text-slate-300">Saldo</div><div className="font-bold">{brl(entradas - saidas)}</div></div>
      </div>
      <div className="bg-white rounded-xl p-4 shadow-sm space-y-2">
        <div className="grid grid-cols-3 gap-2"><button onClick={() => set("tipo", "entrada")} className={`py-2 rounded-lg text-sm font-medium ${f.tipo === "entrada" ? "bg-green-600 text-white" : "bg-slate-100"}`}>Entrada</button><button onClick={() => set("tipo", "saida")} className={`py-2 rounded-lg text-sm font-medium ${f.tipo === "saida" ? "bg-red-500 text-white" : "bg-slate-100"}`}>Saída</button><button onClick={() => set("tipo", "saldo")} className={`py-2 rounded-lg text-sm font-medium ${f.tipo === "saldo" ? "bg-slate-800 text-white" : "bg-slate-100"}`}>Saldo inicial</button></div>
        <input type="number" className="border rounded-lg px-3 py-2 w-full" placeholder="Valor (R$)" value={f.valor} onChange={(e) => set("valor", e.target.value)} />
        <input className="border rounded-lg px-3 py-2 w-full" placeholder="Descrição" value={f.descricao} onChange={(e) => set("descricao", e.target.value)} />
        <div className="grid grid-cols-2 gap-2"><select className="border rounded-lg px-3 py-2 text-sm" value={f.motoId} onChange={(e) => set("motoId", e.target.value)}><option value="">Sem moto vinculada</option>{data.motos.map((m) => <option key={m.id} value={m.id}>{m.modelo} {m.placa}</option>)}</select><input type="date" className="border rounded-lg px-3 py-2 text-sm" value={f.data} onChange={(e) => set("data", e.target.value)} /></div>
        <button onClick={add} className="w-full bg-slate-800 text-white rounded-lg py-2 text-sm font-medium flex items-center justify-center gap-1"><Plus className="w-4 h-4" /> Lançar</button>
        <p className="text-[11px] text-slate-400">Os pagamentos dos contratos devem ser feitos na aba Vencimentos/Cobranças para abater o saldo. Lançamentos aqui são avulsos.</p>
      </div>
      <div className="space-y-2">
        {data.caixa.length > 0 && <div className="relative"><Search className="w-4 h-4 absolute left-3 top-3 text-slate-400" /><input className="border rounded-lg pl-9 pr-3 py-2 w-full text-sm" placeholder="Buscar por descrição ou moto" value={busca} onChange={(e) => setBusca(e.target.value)} /></div>}
        {data.caixa.length === 0 && <p className="text-center text-slate-400 text-sm py-6">Nenhum lançamento.</p>}
        {data.caixa.length > 0 && lista.length === 0 && <p className="text-center text-slate-400 text-sm py-6">Nenhum resultado.</p>}
        {lista.map((c) => (
          <div key={c.id} className="bg-white rounded-xl p-3 shadow-sm flex justify-between items-center">
            <div><div className="font-medium text-sm">{c.descricao || (c.tipo === "entrada" ? "Entrada" : "Saída")}
              {c.pagamentoContrato && <span className="text-[10px] bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded ml-1">pagamento</span>}
              {c.multa && <span className="text-[10px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded ml-1">multa trânsito</span>}
              {c.entradaContrato && <span className="text-[10px] bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded ml-1">entrada</span>}
              {c.saldoInicial && <span className="text-[10px] bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded ml-1">saldo inicial</span>}
              {c.comissaoPaga && <span className="text-[10px] bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded ml-1">comissão</span>}
            </div><div className="text-xs text-slate-400">{fmtDate(c.data)} {motoLabel(c.motoId) && `· ${motoLabel(c.motoId)}`}</div></div>
            <div className="flex items-center gap-2"><span className={`font-semibold text-sm ${c.tipo === "entrada" ? "text-green-600" : "text-red-500"}`}>{c.tipo === "entrada" ? "+" : "−"} {brl(c.valor)}</span><button onClick={() => upd("caixa", (cx) => cx.filter((x) => x.id !== c.id))} className="text-slate-300 hover:text-red-500"><X className="w-4 h-4" /></button></div>
          </div>
        ))}
      </div>
    </div>
  );
}
/* ====================== INICIALIZACAO ====================== */
const _notCfg = SUPABASE_URL.indexOf("COLE_") !== -1 || SUPABASE_KEY.indexOf("COLE_") !== -1;
const _root = ReactDOM.createRoot(document.getElementById("root"));
if (_notCfg) {
  _root.render(
    <div className="max-w-md mx-auto mt-16 bg-white rounded-2xl p-6 shadow">
      <h1 className="font-bold text-lg mb-2 text-slate-800">Falta um passo 🙂</h1>
      <p className="text-sm text-slate-600">Abra este arquivo <b>index.html</b> num editor de texto (Bloco de Notas) e cole, lá no topo, a sua <b>Project URL</b> e a sua <b>chave</b> do Supabase nas linhas <code>SUPABASE_URL</code> e <code>SUPABASE_KEY</code>. Depois salve e atualize a página.</p>
    </div>
  );
} else {
  _root.render(<App />);
}
</script>
